<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - smartmanu.net</title>
    <meta name="description" content="Create a new smartmanu.net account">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preload" href="css/styles.css" as="style">
    <link rel="stylesheet" href="css/styles.css" media="screen">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">smartmanu.net</a>
        </div>
    </header>
    
    <main class="container">
        <div class="auth-form">
            <h1>Register</h1>
            <form id="registerForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="agreeTerms" required>
                        <span>I agree to the <a href="terms-of-service.html">Terms of Service</a> and <a href="privacy-policy.html">Privacy Policy</a></span>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" onclick="handleRegister()">Register</button>
                <p class="form-link">
                    <a href="login.html">Already have an account? Login here</a>
                </p>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 smartmanu.net. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js" defer></script>
</body>
</html>
