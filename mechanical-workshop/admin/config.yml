backend:
  name: github
  repo: YunWU914/HSKB
  branch: main
  base_url: https://courageous-gnome-93f317.netlify.app
  auth_scope: repo

media_folder: "mechanical-workshop/images"
public_folder: "images"

collections:
  - name: "articles"
    label: "文章"
    folder: "mechanical-workshop/articles"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: "HH:mm" }
      - { label: "标签", name: "tags", widget: "list", default: [], required: false }
      - { label: "封面图", name: "cover", widget: "image", required: false }
      - { label: "正文", name: "body", widget: "markdown" }
