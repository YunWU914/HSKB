<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSKB Article Editor</title>
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.snow.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif; 
      background: #f0f2f5; 
      min-height: 100vh;
    }
    .login-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center;
      z-index: 9999;
    }
    .login-box {
      background: white; padding: 40px; border-radius: 16px; width: 90%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .login-box h2 { margin-bottom: 8px; font-size: 22px; }
    .login-box p { color: #666; margin-bottom: 20px; font-size: 14px; }
    .login-box input {
      width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; margin-bottom: 12px;
    }
    .login-box button {
      width: 100%; padding: 12px; background: #ff0080; color: white; border: none;
      border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 500;
    }
    .login-box button:hover { background: #e00070; }
    .login-box .hint { margin-top: 12px; font-size: 12px; color: #999; }
    .login-box .hint a { color: #ff0080; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .toolbar {
      background: white; padding: 20px; border-radius: 12px; margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .toolbar h1 { font-size: 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    .section-title {
      font-size: 14px; font-weight: 600; color: #333; margin: 16px 0 10px;
      padding-bottom: 6px; border-bottom: 1px solid #f0f0f0;
    }

    .meta-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .meta-item { flex: 1; min-width: 200px; }
    .meta-item label {
      display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500;
    }
    .meta-item input, .meta-item select, .meta-item textarea {
      width: 100%; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px;
      font-size: 14px; background: #fafafa; font-family: inherit;
    }
    .meta-item input:focus, .meta-item select:focus, .meta-item textarea:focus {
      outline: none; border-color: #ff0080; background: white;
    }
    .meta-item textarea { resize: vertical; min-height: 60px; }

    .toolbar input[type="text"]#articleTitle {
      width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px;
      font-size: 18px; font-weight: 600; margin-bottom: 12px;
    }
    .toolbar input[type="text"]#articleTitle:focus { outline: none; border-color: #ff0080; }

    /* 文档属性复选框 */
    .attr-group {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .attr-item {
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      font-size: 14px; color: #555;
    }
    .attr-item input[type="checkbox"] {
      width: 16px; height: 16px; cursor: pointer;
    }

    /* Cover Image */
    .cover-preview {
      width: 200px; height: 120px; border: 2px dashed #ddd; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; color: #999;
      font-size: 13px; margin-top: 8px; overflow: hidden; background: #fafafa;
    }
    .cover-preview img { width: 100%; height: 100%; object-fit: cover; }

    /* SEO 折叠面板 */
    .seo-toggle {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      color: #666; font-size: 14px; margin: 12px 0; user-select: none;
    }
    .seo-toggle:hover { color: #ff0080; }
    .seo-panel {
      display: none; background: #fafafa; padding: 16px; border-radius: 8px; margin-bottom: 12px;
    }
    .seo-panel.open { display: block; }

    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .btn {
      padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: #24292e; color: white; }
    .btn-primary:hover { background: #000; }
    .btn-secondary { background: #ff0080; color: white; }
    .btn-secondary:hover { background: #e00070; }
    .btn-ghost { background: #f0f0f0; color: #333; }
    .btn-ghost:hover { background: #e0e0e0; }
    .btn input[type="file"] { display: none; }

    .editor-wrap {
      background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    #editor { height: 480px; font-size: 16px; }
    .ql-toolbar { border: none; border-bottom: 1px solid #eee; padding: 12px !important; }
    .ql-container { border: none; font-size: 16px; }
    .ql-editor { padding: 24px; line-height: 1.8; }
    /* 表格样式 - 自适应宽度 + 自动换行 */
    .ql-editor table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      table-layout: auto;           /* 列宽根据内容自适应 */
      position: relative;             /* 为删除按钮提供定位上下文 */
    }
    .ql-editor table td,
    .ql-editor table th {
      border: 1px solid #ddd;
      padding: 8px 12px;
      text-align: left;
      word-break: break-word;         /* 长单词/URL 自动换行 */
      overflow-wrap: break-word;      /* 兼容处理 */
      white-space: normal;            /* 允许换行 */
      vertical-align: top;            /* 内容顶部对齐 */
      min-width: 40px;                /* 最小宽度，避免太窄 */
    }
    .ql-editor table th {
      background: #f5f5f5;
      font-weight: 600;
      white-space: nowrap;            /* 表头默认不换行，保持整洁 */
    }

    /* ===== Table Delete Button in Toolbar ===== */
    .table-delete-btn-toolbar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 24px;
      cursor: pointer;
      border: none;
      background: transparent;
      border-radius: 3px;
      padding: 0;
      vertical-align: middle;
      margin-left: 2px;
    }
    .table-delete-btn-toolbar:hover {
      background: #f0f0f0;
    }
    .table-delete-btn-toolbar svg {
      width: 18px;
      height: 18px;
      fill: #444;
      pointer-events: none;
    }
    .table-delete-btn-toolbar:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .table-delete-btn-toolbar:disabled:hover {
      background: transparent;
    }

    .status {
      margin-top: 12px; padding: 12px 16px; border-radius: 8px; font-size: 14px;
      display: none;
    }
    .status.show { display: block; }
    .status.success { background: #d4edda; color: #155724; }
    .status.error { background: #f8d7da; color: #721c24; }
    .status.info { background: #d1ecf1; color: #0c5460; }

    .footer { text-align: center; padding: 20px; color: #999; font-size: 12px; }

    /* ===== Table Picker Styles ===== */
    .table-picker-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
    }
    .table-picker-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 24px;
      cursor: pointer;
      border: none;
      background: transparent;
      border-radius: 3px;
      padding: 0;
      outline: none;
    }
    .table-picker-btn:hover {
      background: #f0f0f0;
    }
    .table-picker-btn svg {
      width: 18px;
      height: 18px;
      fill: #444;
      pointer-events: none;
    }
    .table-picker-btn.active {
      background: #e0e0e0;
    }

    .table-picker-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      padding: 12px;
      z-index: 200;
      display: none;
      min-width: 240px;
    }
    .table-picker-dropdown.show {
      display: block;
    }
    .table-picker-info {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
      text-align: center;
      height: 18px;
      line-height: 18px;
      font-weight: 500;
    }
    .table-picker-grid {
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      gap: 3px;
    }
    .table-picker-cell {
      width: 20px;
      height: 20px;
      border: 1px solid #e0e0e0;
      border-radius: 3px;
      cursor: pointer;
      background: #fafafa;
      transition: all 0.08s;
    }
    .table-picker-cell:hover,
    .table-picker-cell.active {
      background: #ff0080;
      border-color: #ff0080;
    }
    .table-picker-footer {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .table-picker-footer span {
      font-size: 12px;
      color: #999;
    }
    .table-picker-footer button {
      font-size: 12px;
      padding: 4px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #ff0080;
      color: white;
      font-weight: 500;
    }
    .table-picker-footer button:hover {
      background: #e00070;
    }
    .table-picker-footer button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
<base target="_blank">
</head>
<body>

  <!-- 登录框 -->
  <div class="login-modal" id="loginModal">
    <div class="login-box">
      <h2>🔐 Editor Login</h2>
      <p>Enter your GitHub Personal Access Token to continue</p>
      <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
      <button onclick="saveToken()">Enter Editor</button>
      <p class="hint">
        No Token? <a href="https://github.com/settings/tokens" target="_blank">Generate on GitHub</a> (check repo scope)<br>
        Token is stored locally in your browser only
      </p>
    </div>
  </div>

  <!-- 编辑器主体 -->
  <div class="container" id="editorContainer" style="display:none;">
    <div class="toolbar">
      <h1>✍️ Publish Article</h1>

      <!-- 基础内容 -->
      <div class="section-title">📋 Basic Info</div>

      <div class="meta-row">
        <div class="meta-item" style="flex: 2;">
          <label>* Title</label>
          <input type="text" id="articleTitle" placeholder="Enter article title...">
        </div>
        <div class="meta-item" style="flex: 1;">
          <label>Subtitle</label>
          <input type="text" id="articleSubtitle" placeholder="输入Subtitle（可选）">
        </div>
      </div>

      <div class="meta-row">
        <div class="meta-item">
          <label>📅 Publish Date</label>
          <input type="date" id="articleDate">
        </div>
        <div class="meta-item">
          <label>✏️ Author</label>
          <input type="text" id="articleAuthor" placeholder="输入Author名字">
        </div>
        <div class="meta-item">
          <label>📂 Category</label>
          <select id="articleCategory">
            <option value="">加载中...</option>
          </select>
        </div>
      </div>

      <!-- Document Attributes -->
      <div class="section-title">🏷️ Document Attributes</div>
      <div class="attr-group">
        <label class="attr-item"><input type="checkbox" id="attrTop"> Top Story</label>
        <label class="attr-item"><input type="checkbox" id="attrRec"> Recommended</label>
        <label class="attr-item"><input type="checkbox" id="attrPush"> Featured</label>
        <label class="attr-item"><input type="checkbox" id="attrBold"> Bold Title</label>
        <label class="attr-item"><input type="checkbox" id="attrImg"> With Image</label>
      </div>

      <!-- 标签 & 封面 -->
      <div class="meta-row">
        <div class="meta-item" style="flex: 2;">
          <label>🏷️ Tags (comma separated)</label>
          <input type="text" id="articleTags" placeholder="e.g. machining, process, tutorial">
        </div>
        <div class="meta-item" style="flex: 1;">
          <label>🖼️ Cover Image</label>
          <label class="btn btn-ghost" style="width: 100%; justify-content: center;">
            📤 Choose File
            <input type="file" accept="image/*" onchange="uploadCover(this)">
          </label>
          <div class="cover-preview" id="coverPreview">No cover</div>
        </div>
      </div>

      <!-- SEO 优化（可折叠） -->
      <div class="seo-toggle" onclick="toggleSeo()">
        <span id="seoArrow">▶</span> 🔍 SEO Settings
      </div>
      <div class="seo-panel" id="seoPanel">
        <div class="meta-row">
          <div class="meta-item">
            <label>SEO Title</label>
            <input type="text" id="seoTitle" placeholder="Title shown in search engines">
          </div>
        </div>
        <div class="meta-row">
          <div class="meta-item">
            <label>SEO Keywords</label>
            <input type="text" id="seoKeywords" placeholder="keyword1, keyword2, keyword3">
          </div>
        </div>
        <div class="meta-row">
          <div class="meta-item">
            <label>SEO Description</label>
            <textarea id="seoDesc" placeholder="Description shown in search results..."></textarea>
          </div>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="publishArticle()">💾 Save & Publish</button>
        <label class="btn btn-secondary">
          🖼️ Upload Image
          <input type="file" accept="image/*" onchange="uploadImage(this)">
        </label>
      </div>
      <div id="status" class="status"></div>
    </div>

    <div class="editor-wrap">
      <div id="editor"></div>
    </div>

    <div class="footer">
      HSKB CMS · Articles saved to GitHub repository
    </div>
  </div>

 <script src="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.js"></script>
  <script>
    const REPO = 'YunWU914/HSKB';
    const BRANCH = 'main';
    const ARTICLES_PATH = 'mechanical-workshop/articles';
    const IMAGES_PATH = 'mechanical-workshop/images';
    const CATEGORIES_PATH = 'mechanical-workshop/categories';

    let token = localStorage.getItem('hskb_editor_token');
    let quill;
    let coverImagePath = '';

    function init() {
      if (!token) {
        document.getElementById('loginModal').style.display = 'flex';
      } else {
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('editorContainer').style.display = 'block';
        startEditor();
        loadCategories();
        document.getElementById('articleDate').value = new Date().toISOString().split('T')[0];
      }
    }

    function saveToken() {
      const val = document.getElementById('tokenInput').value.trim();
      if (val && val.startsWith('ghp_')) {
        token = val;
        localStorage.setItem('hskb_editor_token', token);
        init();
      } else {
        alert('Please enter a valid GitHub Token (starting with ghp_)');
      }
    }

    /* ========== Table Picker + Delete Buttons ========== */
    function initTablePicker() {
      const toolbar = document.querySelector('.ql-toolbar');
      if (!toolbar) return;

      // Find last ql-formats or create one
      let formats = toolbar.querySelector('.ql-formats:last-child');
      if (!formats) {
        formats = document.createElement('span');
        formats.className = 'ql-formats';
        toolbar.appendChild(formats);
      }

      // ===== INSERT TABLE BUTTON =====
      const wrap = document.createElement('span');
      wrap.className = 'table-picker-wrap';
      formats.appendChild(wrap);

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'table-picker-btn';
      btn.title = 'Insert Table';
      btn.innerHTML = `<svg viewBox="0 0 18 18"><rect x="3" y="3" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="7" y1="3" x2="7" y2="15" stroke="currentColor" stroke-width="1.5"/><line x1="11" y1="3" x2="11" y2="15" stroke="currentColor" stroke-width="1.5"/><line x1="3" y1="7" x2="15" y2="7" stroke="currentColor" stroke-width="1.5"/><line x1="3" y1="11" x2="15" y2="11" stroke="currentColor" stroke-width="1.5"/></svg>`;
      wrap.appendChild(btn);

      const dropdown = document.createElement('div');
      dropdown.className = 'table-picker-dropdown';
      dropdown.innerHTML = `
        <div class="table-picker-info" id="tablePickerInfo">0 cols x 0 rows</div>
        <div class="table-picker-grid" id="tablePickerGrid"></div>
        <div class="table-picker-footer">
          <span>Hover to select size</span>
          <button type="button" id="tablePickerConfirm" disabled>Insert</button>
        </div>
      `;
      wrap.appendChild(dropdown);

      const grid = dropdown.querySelector('#tablePickerGrid');
      const info = dropdown.querySelector('#tablePickerInfo');
      const confirmBtn = dropdown.querySelector('#tablePickerConfirm');

      const MAX_COLS = 15;
      const MAX_ROWS = 15;
      let selectedCols = 0;
      let selectedRows = 0;

      for (let r = 1; r <= MAX_ROWS; r++) {
        for (let c = 1; c <= MAX_COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'table-picker-cell';
          cell.dataset.row = r;
          cell.dataset.col = c;
          grid.appendChild(cell);
        }
      }

      function highlight(rows, cols) {
        grid.querySelectorAll('.table-picker-cell').forEach(cell => {
          const r = parseInt(cell.dataset.row);
          const c = parseInt(cell.dataset.col);
          if (r <= rows && c <= cols) {
            cell.classList.add('active');
          } else {
            cell.classList.remove('active');
          }
        });
        selectedCols = cols;
        selectedRows = rows;
        info.textContent = cols + ' cols x ' + rows + ' rows';
        confirmBtn.disabled = !(rows > 0 && cols > 0);
      }

      grid.addEventListener('mouseover', function(e) {
        if (e.target.classList.contains('table-picker-cell')) {
          const r = parseInt(e.target.dataset.row);
          const c = parseInt(e.target.dataset.col);
          highlight(r, c);
        }
      });

      grid.addEventListener('click', function(e) {
        if (e.target.classList.contains('table-picker-cell')) {
          const r = parseInt(e.target.dataset.row);
          const c = parseInt(e.target.dataset.col);
          insertTable(r, c);
          dropdown.classList.remove('show');
          btn.classList.remove('active');
          highlight(0, 0);
        }
      });

      confirmBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (selectedRows > 0 && selectedCols > 0) {
          insertTable(selectedRows, selectedCols);
        }
        dropdown.classList.remove('show');
        btn.classList.remove('active');
        highlight(0, 0);
      });

      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        e.preventDefault();
        const isOpen = dropdown.classList.contains('show');
        document.querySelectorAll('.table-picker-dropdown.show').forEach(d => d.classList.remove('show'));
        document.querySelectorAll('.table-picker-btn.active').forEach(b => b.classList.remove('active'));
        if (!isOpen) {
          dropdown.classList.add('show');
          btn.classList.add('active');
          highlight(0, 0);
        }
      });

      document.addEventListener('click', function(e) {
        if (!wrap.contains(e.target)) {
          dropdown.classList.remove('show');
          btn.classList.remove('active');
          highlight(0, 0);
        }
      });

      // ===== DELETE TABLE BUTTON =====
      const delBtn = document.createElement('button');
      delBtn.type = 'button';
      delBtn.className = 'table-delete-btn-toolbar';
      delBtn.title = 'Delete Table';
      // Trash can / delete table icon
      delBtn.innerHTML = `<svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="12" height="12"/><line x1="7" y1="3" x2="7" y2="15" stroke="currentColor" stroke-width="1.5"/><line x1="11" y1="3" x2="11" y2="15" stroke="currentColor" stroke-width="1.5"/><line x1="3" y1="7" x2="15" y2="7" stroke="currentColor" stroke-width="1.5"/><line x1="3" y1="11" x2="15" y2="11" stroke="currentColor" stroke-width="1.5"/><line x1="2" y1="2" x2="16" y2="16" stroke="#ff4444" stroke-width="1.8"/></svg>`;
      formats.appendChild(delBtn);

      delBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        deleteCurrentTable();
      });
    }

    function insertTable(rows, cols) {
      const range = quill.getSelection(true);
      if (!range) return;

      const tableModule = quill.getModule('table');
      if (tableModule && typeof tableModule.insertTable === 'function') {
        tableModule.insertTable(rows, cols);
      } else {
        let html = '<table><tbody>';
        for (let r = 0; r < rows; r++) {
          html += '<tr>';
          for (let c = 0; c < cols; c++) {
            html += '<td><br></td>';
          }
          html += '</tr>';
        }
        html += '</tbody></table>';
        quill.clipboard.dangerouslyPasteHTML(range.index, html);
      }
      quill.focus();
    }

    function deleteCurrentTable() {
      const sel = quill.getSelection();
      if (!sel) return;

      let node = null;

      // Try to get node from selection start
      const [leaf] = quill.getLeaf(sel.index);
      if (leaf && leaf.domNode) {
        node = leaf.domNode.nodeType === 3 ? leaf.domNode.parentElement : leaf.domNode;
      }

      if (!node) return;

      // Find closest table element
      const tableEl = node.closest ? node.closest('table') : null;
      if (!tableEl) return;

      // Pure DOM removal — most reliable across Quill versions
      const next = tableEl.nextElementSibling;
      if (next && next.tagName === 'P' && !(next.textContent || '').trim()) next.remove();
      const prev = tableEl.previousElementSibling;
      if (prev && prev.tagName === 'P' && !(prev.textContent || '').trim()) prev.remove();
      tableEl.remove();
      quill.update(Quill.sources.USER);
    }
    /* ========== 表格选择器结束 ========== */

    function startEditor() {
      quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: 'Start writing your article here. Supports text formatting, images, and tables...',
        modules: {
          toolbar: [
            [{ 'header': [1, 2, 3, false] }],
            ['bold', 'italic', 'underline', 'strike'],
            [{ 'color': [] }, { 'background': [] }],
            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
            [{ 'align': [] }],
            ['link', 'image'],
            ['clean']
          ],
          table: true
        }
      });

      // Init table picker after toolbar renders
      setTimeout(initTablePicker, 200);

      // ===== Drag & Drop Image Upload =====
      const editorEl = document.getElementById('editor');
      const qlContainer = editorEl.querySelector('.ql-container') || editorEl;
      const qlEditor = editorEl.querySelector('.ql-editor') || editorEl;

      // Prevent default drag behaviors on the whole page
      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(function(eventName) {
        qlEditor.addEventListener(eventName, preventDefaults, false);
        document.body.addEventListener(eventName, preventDefaults, false);
      });

      function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
      }

      // Highlight editor on drag over
      qlEditor.addEventListener('dragenter', function() {
        qlEditor.style.outline = '2px dashed #ff0080';
        qlEditor.style.outlineOffset = '4px';
      });
      qlEditor.addEventListener('dragleave', function(e) {
        if (e.target === qlEditor) {
          qlEditor.style.outline = '';
          qlEditor.style.outlineOffset = '';
        }
      });
      qlEditor.addEventListener('drop', function() {
        qlEditor.style.outline = '';
        qlEditor.style.outlineOffset = '';
      });

      // Handle dropped files
      qlEditor.addEventListener('drop', function(e) {
        const dt = e.dataTransfer;
        if (!dt || !dt.files) return;

        const files = Array.from(dt.files).filter(function(f) {
          return f.type.startsWith('image/');
        });

        if (files.length === 0) return;

        // Get drop position in editor
        const range = quill.getSelection(true) || { index: quill.getLength() };

        files.forEach(function(file, i) {
          if (file.size > 5 * 1024 * 1024) {
            showStatus('Image too large (max 5MB): ' + file.name, 'error');
            return;
          }
          uploadDroppedImage(file, range.index + i);
        });
      });

      function uploadDroppedImage(file, insertIndex) {
        showStatus('Uploading image: ' + file.name + '...', 'info');
        const reader = new FileReader();
        reader.onload = async function(e) {
          const base64 = e.target.result.split(',')[1];
          const ext = file.name.split('.').pop().toLowerCase();
          const filename = 'img-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6) + '.' + ext;

          try {
            const res = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + IMAGES_PATH + '/' + filename, {
              method: 'PUT',
              headers: {
                'Authorization': 'token ' + token,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                message: 'Upload image: ' + filename,
                content: base64,
                branch: BRANCH
              })
            });

            if (res.ok) {
              quill.insertEmbed(insertIndex, 'image', '../images/' + filename);
              showStatus('Image uploaded: ' + file.name, 'success');
            } else {
              const err = await res.json();
              showStatus('Upload failed: ' + (err.message || 'Unknown error'), 'error');
            }
          } catch(err) {
            showStatus('Network error: ' + err.message, 'error');
          }
        };
        reader.readAsDataURL(file);
      }

      // ===== Keyboard Table Deletion (backup) =====
      quill.root.addEventListener('keydown', function(e) {
        if (e.key !== 'Backspace' && e.key !== 'Delete') return;

        const sel = document.getSelection();
        if (!sel || !sel.rangeCount) return;
        const rng = sel.getRangeAt(0);
        if (!rng.collapsed) return;

        let p = rng.startContainer;
        while (p && p !== quill.root) {
          if (p.nodeType === 1 && p.tagName === 'P') break;
          p = p.parentElement;
        }
        if (!p || p === quill.root) return;

        const txt = (p.textContent || '').trim();
        const html = p.innerHTML || '';
        const isEmpty = txt === '' || html === '<br>' || html === '<br/>' || html === '<br />';
        if (!isEmpty) return;

        if (e.key === 'Backspace') {
          const prev = p.previousElementSibling;
          if (prev && prev.tagName === 'TABLE') {
            e.preventDefault();
            e.stopPropagation();
            prev.remove();
            p.remove();
            quill.update(Quill.sources.USER);
            return;
          }
        }

        if (e.key === 'Delete') {
          const next = p.nextElementSibling;
          if (next && next.tagName === 'TABLE') {
            e.preventDefault();
            e.stopPropagation();
            p.remove();
            next.remove();
            quill.update(Quill.sources.USER);
            return;
          }
        }
      });
    }

    function toggleSeo() {
      const panel = document.getElementById('seoPanel');
      const arrow = document.getElementById('seoArrow');
      panel.classList.toggle('open');
      arrow.textContent = panel.classList.contains('open') ? '▼' : '▶';
    }

    async function loadCategories() {
      const select = document.getElementById('articleCategory');
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${CATEGORIES_PATH}?ref=${BRANCH}`, {
          headers: { 'Authorization': 'token ' + token }
        });

        if (res.ok) {
          const data = await res.json();
          const categories = data
            .filter(item => item.type === 'dir' || item.name.endsWith('.html') || item.name.endsWith('.md'))
            .map(item => {
              const name = item.name.replace(/\.(html|md)$/, '');
              return { name, path: item.path };
            });

          if (categories.length > 0) {
            select.innerHTML = '<option value="">Select Category</option>' + 
              categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
          } else {
            setDefaultCategories();
          }
        } else {
          setDefaultCategories();
        }
      } catch(e) {
        setDefaultCategories();
      }
    }

    function setDefaultCategories() {
      const select = document.getElementById('articleCategory');
      select.innerHTML = `
        <option value="">Select Category</option>
        <option value="General Machinery">General Machinery</option>
        <option value="Construction Machinery">Construction Machinery</option>
        <option value="Cleaning and Ventilation Equipment">Cleaning and Ventilation Equipment</option>
        <option value="Machine Tools and Tooling Machinery">Machine Tools and Tooling Machinery</option>
        <option value="Logistics Equipment">Logistics Equipment</option>
        <option value="Food Machinery">Food Machinery</option>
        <option value="Other Special-purpose Equipment">Other Special-purpose Equipment</option>
        <option value="Hardware Accessories & Standard Parts">Hardware Accessories & Standard Parts</option>
      `;
    }

    // 上传Cover Image
    async function uploadCover(input) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      if (file.size > 5 * 1024 * 1024) {
        showStatus('Cover Image不能超过 5MB', 'error');
        return;
      }

      showStatus('正在上传封面...', 'info');
      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64 = e.target.result.split(',')[1];
        const ext = file.name.split('.').pop().toLowerCase();
        const filename = 'cover-' + Date.now() + '.' + ext;

        try {
          const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${IMAGES_PATH}/${filename}`, {
            method: 'PUT',
            headers: {
              'Authorization': 'token ' + token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              message: 'Upload cover: ' + filename,
              content: base64,
              branch: BRANCH
            })
          });

          if (res.ok) {
            coverImagePath = `../images/${filename}`;
            document.getElementById('coverPreview').innerHTML = `<img src="${e.target.result}" alt="封面预览">`;
            showStatus('✅ 封面上传成功', 'success');
          } else {
            const err = await res.json();
            showStatus('封面上传失败: ' + (err.message || '未知错误'), 'error');
          }
        } catch(e) {
          showStatus('网络错误: ' + e.message, 'error');
        }
      };
      reader.readAsDataURL(file);
      input.value = '';
    }

    // 上传文章内图片
    async function uploadImage(input) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      if (file.size > 5 * 1024 * 1024) {
        showStatus('图片不能超过 5MB', 'error');
        return;
      }

      showStatus('正在上传图片...', 'info');
      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64 = e.target.result.split(',')[1];
        const ext = file.name.split('.').pop().toLowerCase();
        const filename = 'img-' + Date.now() + '.' + ext;

        try {
          const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${IMAGES_PATH}/${filename}`, {
            method: 'PUT',
            headers: {
              'Authorization': 'token ' + token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              message: 'Upload image: ' + filename,
              content: base64,
              branch: BRANCH
            })
          });

          if (res.ok) {
            const range = quill.getSelection() || { index: 0 };
            quill.insertEmbed(range.index, 'image', `../images/${filename}`);
            quill.setSelection(range.index + 1);
            showStatus('✅ 图片上传成功，已插入文章', 'success');
          } else {
            const err = await res.json();
            showStatus('上传失败: ' + (err.message || '未知错误'), 'error');
          }
        } catch(e) {
          showStatus('网络错误: ' + e.message, 'error');
        }
      };
      reader.readAsDataURL(file);
      input.value = '';
    }

    // 发布文章
    async function publishArticle() {
      const title = document.getElementById('articleTitle').value.trim();
      const subtitle = document.getElementById('articleSubtitle').value.trim();
      const date = document.getElementById('articleDate').value;
      const author = document.getElementById('articleAuthor').value.trim() || 'Anonymous';
      const category = document.getElementById('articleCategory').value || 'Uncategorized';
      const tags = document.getElementById('articleTags').value.trim();

      const attrs = [];
      if (document.getElementById('attrTop').checked) attrs.push('Top Story');
      if (document.getElementById('attrRec').checked) attrs.push('Recommended');
      if (document.getElementById('attrPush').checked) attrs.push('Featured');
      if (document.getElementById('attrBold').checked) attrs.push('Bold Title');
      if (document.getElementById('attrImg').checked) attrs.push('With Image');

      const seoTitle = document.getElementById('seoTitle').value.trim();
      const seoKeywords = document.getElementById('seoKeywords').value.trim();
      const seoDesc = document.getElementById('seoDesc').value.trim();

      if (!title) {
        alert('Please enter article title');
        return;
      }
      if (!date) {
        alert('Please select publish date');
        return;
      }

      // Clean Quill's internal markup before saving
      let rawHtml = quill.root.innerHTML;

      // Remove Quill internal UI spans
      rawHtml = rawHtml.replace(/<span class="ql-ui"[^>]*>.*?<\/span>/gi, '');
      // Remove data-row attributes from table cells
      rawHtml = rawHtml.replace(/\s*data-row="[^"]*"/gi, '');
      // Remove inline background-color: rgb(255, 255, 255) and color: rgba(0,0,0,0.9) styles (Quill defaults)
      rawHtml = rawHtml.replace(/\s*style="[^"]*background-color:\s*rgb\(255,\s*255,\s*255\)[^"]*"/gi, '');
      rawHtml = rawHtml.replace(/\s*style="[^"]*color:\s*rgba\(0,\s*0,\s*0,\s*0\.9\)[^"]*"/gi, '');
      // Clean up empty style attributes
      rawHtml = rawHtml.replace(/\s*style=""/gi, '');
      // Remove contenteditable="false" from spans
      rawHtml = rawHtml.replace(/\s*contenteditable="false"/gi, '');

      const content = rawHtml;

      if (!content || content === '<p><br></p>') {
        alert('Article content cannot be empty');
        return;
      }

      const slug = title.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '-').replace(/-+/g, '-').toLowerCase();
      const filename = `${date}-${slug}.html`;

      let metaTags = '';
      if (seoTitle) metaTags += `  <meta name="title" content="${seoTitle}">\n`;
      if (seoKeywords) metaTags += `  <meta name="keywords" content="${seoKeywords}">\n`;
      if (seoDesc) metaTags += `  <meta name="description" content="${seoDesc}">\n`;

      const attrStr = attrs.length > 0 ? attrs.join(',') : '';
      const tagsHtml = tags ? tags.split(/[,，]/).map(t => `<span class="tag">${t.trim()}</span>`).join('') : '';

      const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
${metaTags}  <title>${title}${subtitle ? ' - ' + subtitle : ''}</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <article class="article-page" data-category="${category}" data-attrs="${attrStr}" data-date="${date}">
    <header class="article-header">
      <div class="article-category-row">
        <span class="article-category">${category}</span>
        ${attrStr ? `<span class="article-attrs">${attrStr}</span>` : ''}
      </div>
      <h1>${title}</h1>
      ${subtitle ? `<h2 class="article-subtitle">${subtitle}</h2>` : ''}
      <div class="article-meta">
        <span class="article-author">👤 ${author}</span>
        <span class="article-date">📅 ${date}</span>
        ${tagsHtml ? `<div class="article-tags">🏷️ ${tagsHtml}</div>` : ''}
      </div>
      ${coverImagePath ? `<div class="article-cover"><img src="${coverImagePath}" alt="${title}"></div>` : ''}
    </header>
    <div class="article-content">
${content}
    </div>
  </article>
</body>
</html>`;

      const base64 = btoa(unescape(encodeURIComponent(html)));

      showStatus('Saving article...', 'info');

      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${ARTICLES_PATH}/${filename}`, {
          method: 'PUT',
          headers: {
            'Authorization': 'token ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: `Add article: ${title} [${category}]`,
            content: base64,
            branch: BRANCH
          })
        });

        if (res.ok) {
          showStatus('Article published successfully! Site updates in ~2 minutes', 'success');
          // Clear form
          document.getElementById('articleTitle').value = '';
          document.getElementById('articleSubtitle').value = '';
          document.getElementById('articleAuthor').value = '';
          document.getElementById('articleTags').value = '';
          document.getElementById('seoTitle').value = '';
          document.getElementById('seoKeywords').value = '';
          document.getElementById('seoDesc').value = '';
          document.getElementById('coverPreview').innerHTML = 'No cover';
          document.getElementById('attrTop').checked = false;
          document.getElementById('attrRec').checked = false;
          document.getElementById('attrPush').checked = false;
          document.getElementById('attrBold').checked = false;
          document.getElementById('attrImg').checked = false;
          coverImagePath = '';
          quill.setContents([]);
        } else {
          const err = await res.json();
          if (res.status === 401) {
            showStatus('Token expired. Please log in again.', 'error');
            localStorage.removeItem('hskb_editor_token');
            setTimeout(() => location.reload(), 2000);
          } else {
            showStatus('Save failed: ' + (err.message || 'Unknown error'), 'error');
          }
        }
      } catch(e) {
        showStatus('Network error: ' + e.message, 'error');
      }
    }
function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status show ' + type;
      if (type === 'success') {
        setTimeout(() => el.classList.remove('show'), 6000);
      }
    }

    init();
  </script>
</body>
