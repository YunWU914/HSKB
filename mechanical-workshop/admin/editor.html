<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSKB 文章编辑器</title>
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.snow.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif; 
      background: #f0f2f5; 
      min-height: 100vh;
    }
    .login-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center;
      z-index: 9999;
    }
    .login-box {
      background: white; padding: 40px; border-radius: 16px; width: 90%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .login-box h2 { margin-bottom: 8px; font-size: 22px; }
    .login-box p { color: #666; margin-bottom: 20px; font-size: 14px; }
    .login-box input {
      width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; margin-bottom: 12px;
    }
    .login-box button {
      width: 100%; padding: 12px; background: #ff0080; color: white; border: none;
      border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 500;
    }
    .login-box button:hover { background: #e00070; }
    .login-box .hint { margin-top: 12px; font-size: 12px; color: #999; }
    .login-box .hint a { color: #ff0080; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .toolbar {
      background: white; padding: 20px; border-radius: 12px; margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .toolbar h1 { font-size: 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    
    .section-title {
      font-size: 14px; font-weight: 600; color: #333; margin: 16px 0 10px;
      padding-bottom: 6px; border-bottom: 1px solid #f0f0f0;
    }
    
    .meta-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .meta-item { flex: 1; min-width: 200px; }
    .meta-item label {
      display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500;
    }
    .meta-item input, .meta-item select, .meta-item textarea {
      width: 100%; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px;
      font-size: 14px; background: #fafafa; font-family: inherit;
    }
    .meta-item input:focus, .meta-item select:focus, .meta-item textarea:focus {
      outline: none; border-color: #ff0080; background: white;
    }
    .meta-item textarea { resize: vertical; min-height: 60px; }
    
    .toolbar input[type="text"]#articleTitle {
      width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px;
      font-size: 18px; font-weight: 600; margin-bottom: 12px;
    }
    .toolbar input[type="text"]#articleTitle:focus { outline: none; border-color: #ff0080; }
    
    /* 文档属性复选框 */
    .attr-group {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .attr-item {
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      font-size: 14px; color: #555;
    }
    .attr-item input[type="checkbox"] {
      width: 16px; height: 16px; cursor: pointer;
    }
    
    /* 封面图片 */
    .cover-preview {
      width: 200px; height: 120px; border: 2px dashed #ddd; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; color: #999;
      font-size: 13px; margin-top: 8px; overflow: hidden; background: #fafafa;
    }
    .cover-preview img { width: 100%; height: 100%; object-fit: cover; }
    
    /* SEO 折叠面板 */
    .seo-toggle {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      color: #666; font-size: 14px; margin: 12px 0; user-select: none;
    }
    .seo-toggle:hover { color: #ff0080; }
    .seo-panel {
      display: none; background: #fafafa; padding: 16px; border-radius: 8px; margin-bottom: 12px;
    }
    .seo-panel.open { display: block; }
    
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .btn {
      padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: #24292e; color: white; }
    .btn-primary:hover { background: #000; }
    .btn-secondary { background: #ff0080; color: white; }
    .btn-secondary:hover { background: #e00070; }
    .btn-ghost { background: #f0f0f0; color: #333; }
    .btn-ghost:hover { background: #e0e0e0; }
    .btn input[type="file"] { display: none; }

    .editor-wrap {
      background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    #editor { height: 480px; font-size: 16px; }
    .ql-toolbar { border: none; border-bottom: 1px solid #eee; padding: 12px !important; }
    .ql-container { border: none; font-size: 16px; }
    .ql-editor { padding: 24px; line-height: 1.8; }
    /* 表格样式 */
    .ql-editor table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    .ql-editor table td, .ql-editor table th {
      border: 1px solid #ddd; padding: 8px 12px; text-align: left;
    }
    .ql-editor table th { background: #f5f5f5; font-weight: 600; }

    .status {
      margin-top: 12px; padding: 12px 16px; border-radius: 8px; font-size: 14px;
      display: none;
    }
    .status.show { display: block; }
    .status.success { background: #d4edda; color: #155724; }
    .status.error { background: #f8d7da; color: #721c24; }
    .status.info { background: #d1ecf1; color: #0c5460; }

    .footer { text-align: center; padding: 20px; color: #999; font-size: 12px; }
  </style>
</head>
<body>

  <!-- 登录框 -->
  <div class="login-modal" id="loginModal">
    <div class="login-box">
      <h2>🔐 编辑器登录</h2>
      <p>请输入 GitHub Personal Access Token 以继续</p>
      <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
      <button onclick="saveToken()">进入编辑器</button>
      <p class="hint">
        没有 Token？<a href="https://github.com/settings/tokens" target="_blank">去 GitHub 生成</a>（勾选 repo 权限）<br>
        Token 仅保存在本机浏览器，不会上传到其他服务器
      </p>
    </div>
  </div>

  <!-- 编辑器主体 -->
  <div class="container" id="editorContainer" style="display:none;">
    <div class="toolbar">
      <h1>✍️ 发布文档</h1>
      
      <!-- 基础内容 -->
      <div class="section-title">📋 基础内容</div>
      
      <div class="meta-row">
        <div class="meta-item" style="flex: 2;">
          <label>* 文档标题</label>
          <input type="text" id="articleTitle" placeholder="输入文章标题...">
        </div>
        <div class="meta-item" style="flex: 1;">
          <label>副标题</label>
          <input type="text" id="articleSubtitle" placeholder="输入副标题（可选）">
        </div>
      </div>
      
      <div class="meta-row">
        <div class="meta-item">
          <label>📅 发布日期</label>
          <input type="date" id="articleDate">
        </div>
        <div class="meta-item">
          <label>✏️ 作者</label>
          <input type="text" id="articleAuthor" placeholder="输入作者名字">
        </div>
        <div class="meta-item">
          <label>📂 栏目分类</label>
          <select id="articleCategory">
            <option value="">加载中...</option>
          </select>
        </div>
      </div>
      
      <!-- 文档属性 -->
      <div class="section-title">🏷️ 文档属性</div>
      <div class="attr-group">
        <label class="attr-item"><input type="checkbox" id="attrTop"> 头条</label>
        <label class="attr-item"><input type="checkbox" id="attrRec"> 推荐</label>
        <label class="attr-item"><input type="checkbox" id="attrPush"> 加推</label>
        <label class="attr-item"><input type="checkbox" id="attrBold"> 标粗</label>
        <label class="attr-item"><input type="checkbox" id="attrImg"> 有图</label>
      </div>
      
      <!-- 标签 & 封面 -->
      <div class="meta-row">
        <div class="meta-item" style="flex: 2;">
          <label>🏷️ 文档标签（多个标签用逗号隔开）</label>
          <input type="text" id="articleTags" placeholder="例如：机械加工, 工艺, 教程">
        </div>
        <div class="meta-item" style="flex: 1;">
          <label>🖼️ 封面图片</label>
          <label class="btn btn-ghost" style="width: 100%; justify-content: center;">
            📤 选择上传
            <input type="file" accept="image/*" onchange="uploadCover(this)">
          </label>
          <div class="cover-preview" id="coverPreview">暂无封面</div>
        </div>
      </div>
      
      <!-- SEO 优化（可折叠） -->
      <div class="seo-toggle" onclick="toggleSeo()">
        <span id="seoArrow">▶</span> 🔍 SEO 优化设置
      </div>
      <div class="seo-panel" id="seoPanel">
        <div class="meta-row">
          <div class="meta-item">
            <label>SEO 标题</label>
            <input type="text" id="seoTitle" placeholder="搜索引擎显示的标题">
          </div>
        </div>
        <div class="meta-row">
          <div class="meta-item">
            <label>SEO 关键词</label>
            <input type="text" id="seoKeywords" placeholder="关键词1, 关键词2, 关键词3">
          </div>
        </div>
        <div class="meta-row">
          <div class="meta-item">
            <label>SEO 描述</label>
            <textarea id="seoDesc" placeholder="搜索引擎显示的摘要描述..."></textarea>
          </div>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="publishArticle()">💾 保存并发布</button>
        <label class="btn btn-secondary">
          🖼️ 上传文章图片
          <input type="file" accept="image/*" onchange="uploadImage(this)">
        </label>
      </div>
      <div id="status" class="status"></div>
    </div>

    <div class="editor-wrap">
      <div id="editor"></div>
    </div>

    <div class="footer">
      HSKB 内容管理系统 · 文章将保存至 GitHub 仓库
    </div>
  </div>

 <script src="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.js"></script>
  <script>
    const REPO = 'YunWU914/HSKB';
    const BRANCH = 'main';
    const ARTICLES_PATH = 'mechanical-workshop/articles';
    const IMAGES_PATH = 'mechanical-workshop/images';
    const CATEGORIES_PATH = 'mechanical-workshop/categories';

    let token = localStorage.getItem('hskb_editor_token');
    let quill;
    let coverImagePath = '';

    function init() {
      if (!token) {
        document.getElementById('loginModal').style.display = 'flex';
      } else {
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('editorContainer').style.display = 'block';
        startEditor();
        loadCategories();
        document.getElementById('articleDate').value = new Date().toISOString().split('T')[0];
      }
    }

    function saveToken() {
      const val = document.getElementById('tokenInput').value.trim();
      if (val && val.startsWith('ghp_')) {
        token = val;
        localStorage.setItem('hskb_editor_token', token);
        init();
      } else {
        alert('请输入正确的 GitHub Token（以 ghp_ 开头）');
      }
    }

    function startEditor() {
      quill = new Quill('#editor', {
  theme: 'snow',
  placeholder: '从这里开始写文章，支持文字排版、插入图片、插入表格...',
  modules: {
    toolbar: [
      [{ 'header': [1, 2, 3, false] }],
      ['bold', 'italic', 'underline', 'strike'],
      [{ 'color': [] }, { 'background': [] }],
      [{ 'list': 'ordered'}, { 'list': 'bullet' }],
      [{ 'align': [] }],
      ['link', 'image'],
      [{ 'table': [] }],   // ← Quill 2.0 原生表格按钮
      ['clean']
    ]
  }
});
    }

    function toggleSeo() {
      const panel = document.getElementById('seoPanel');
      const arrow = document.getElementById('seoArrow');
      panel.classList.toggle('open');
      arrow.textContent = panel.classList.contains('open') ? '▼' : '▶';
    }

    async function loadCategories() {
      const select = document.getElementById('articleCategory');
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${CATEGORIES_PATH}?ref=${BRANCH}`, {
          headers: { 'Authorization': 'token ' + token }
        });
        
        if (res.ok) {
          const data = await res.json();
          const categories = data
            .filter(item => item.type === 'dir' || item.name.endsWith('.html') || item.name.endsWith('.md'))
            .map(item => {
              const name = item.name.replace(/\.(html|md)$/, '');
              return { name, path: item.path };
            });
          
          if (categories.length > 0) {
            select.innerHTML = '<option value="">请选择分类</option>' + 
              categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
          } else {
            setDefaultCategories();
          }
        } else {
          setDefaultCategories();
        }
      } catch(e) {
        setDefaultCategories();
      }
    }

    function setDefaultCategories() {
      const select = document.getElementById('articleCategory');
      select.innerHTML = `
        <option value="">请选择分类</option>
        <option value="公司动态">公司动态</option>
        <option value="新闻资讯">新闻资讯</option>
        <option value="技术教程">技术教程</option>
        <option value="产品展示">产品展示</option>
        <option value="活动公告">活动公告</option>
        <option value="未分类">未分类</option>
      `;
    }

    // 上传封面图片
    async function uploadCover(input) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      if (file.size > 5 * 1024 * 1024) {
        showStatus('封面图片不能超过 5MB', 'error');
        return;
      }

      showStatus('正在上传封面...', 'info');
      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64 = e.target.result.split(',')[1];
        const ext = file.name.split('.').pop().toLowerCase();
        const filename = 'cover-' + Date.now() + '.' + ext;

        try {
          const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${IMAGES_PATH}/${filename}`, {
            method: 'PUT',
            headers: {
              'Authorization': 'token ' + token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              message: 'Upload cover: ' + filename,
              content: base64,
              branch: BRANCH
            })
          });

          if (res.ok) {
            coverImagePath = `../images/${filename}`;
            document.getElementById('coverPreview').innerHTML = `<img src="${e.target.result}" alt="封面预览">`;
            showStatus('✅ 封面上传成功', 'success');
          } else {
            const err = await res.json();
            showStatus('封面上传失败: ' + (err.message || '未知错误'), 'error');
          }
        } catch(e) {
          showStatus('网络错误: ' + e.message, 'error');
        }
      };
      reader.readAsDataURL(file);
      input.value = '';
    }

    // 上传文章内图片
    async function uploadImage(input) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      if (file.size > 5 * 1024 * 1024) {
        showStatus('图片不能超过 5MB', 'error');
        return;
      }

      showStatus('正在上传图片...', 'info');
      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64 = e.target.result.split(',')[1];
        const ext = file.name.split('.').pop().toLowerCase();
        const filename = 'img-' + Date.now() + '.' + ext;

        try {
          const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${IMAGES_PATH}/${filename}`, {
            method: 'PUT',
            headers: {
              'Authorization': 'token ' + token,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              message: 'Upload image: ' + filename,
              content: base64,
              branch: BRANCH
            })
          });

          if (res.ok) {
            const range = quill.getSelection() || { index: 0 };
            quill.insertEmbed(range.index, 'image', `../images/${filename}`);
            quill.setSelection(range.index + 1);
            showStatus('✅ 图片上传成功，已插入文章', 'success');
          } else {
            const err = await res.json();
            showStatus('上传失败: ' + (err.message || '未知错误'), 'error');
          }
        } catch(e) {
          showStatus('网络错误: ' + e.message, 'error');
        }
      };
      reader.readAsDataURL(file);
      input.value = '';
    }

    // 发布文章
    async function publishArticle() {
      const title = document.getElementById('articleTitle').value.trim();
      const subtitle = document.getElementById('articleSubtitle').value.trim();
      const date = document.getElementById('articleDate').value;
      const author = document.getElementById('articleAuthor').value.trim() || '匿名';
      const category = document.getElementById('articleCategory').value || '未分类';
      const tags = document.getElementById('articleTags').value.trim();
      
      const attrs = [];
      if (document.getElementById('attrTop').checked) attrs.push('头条');
      if (document.getElementById('attrRec').checked) attrs.push('推荐');
      if (document.getElementById('attrPush').checked) attrs.push('加推');
      if (document.getElementById('attrBold').checked) attrs.push('标粗');
      if (document.getElementById('attrImg').checked) attrs.push('有图');
      
      const seoTitle = document.getElementById('seoTitle').value.trim();
      const seoKeywords = document.getElementById('seoKeywords').value.trim();
      const seoDesc = document.getElementById('seoDesc').value.trim();
      
      if (!title) {
        alert('请输入文章标题');
        return;
      }
      if (!date) {
        alert('请选择发布日期');
        return;
      }

      const content = quill.root.innerHTML;
      if (!content || content === '<p><br></p>') {
        alert('文章内容不能为空');
        return;
      }

      const slug = title.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '-').replace(/-+/g, '-').toLowerCase();
      const filename = `${date}-${slug}.html`;

      let metaTags = '';
      if (seoTitle) metaTags += `  <meta name="title" content="${seoTitle}">\n`;
      if (seoKeywords) metaTags += `  <meta name="keywords" content="${seoKeywords}">\n`;
      if (seoDesc) metaTags += `  <meta name="description" content="${seoDesc}">\n`;
      
      const attrStr = attrs.length > 0 ? attrs.join(',') : '';
      const tagsHtml = tags ? tags.split(/[,，]/).map(t => `<span class="tag">${t.trim()}</span>`).join('') : '';

      const html = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
${metaTags}  <title>${title}${subtitle ? ' - ' + subtitle : ''}</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <article class="article-page" data-category="${category}" data-attrs="${attrStr}" data-date="${date}">
    <header class="article-header">
      <div class="article-category-row">
        <span class="article-category">${category}</span>
        ${attrStr ? `<span class="article-attrs">${attrStr}</span>` : ''}
      </div>
      <h1>${title}</h1>
      ${subtitle ? `<h2 class="article-subtitle">${subtitle}</h2>` : ''}
      <div class="article-meta">
        <span class="article-author">👤 ${author}</span>
        <span class="article-date">📅 ${date}</span>
        ${tagsHtml ? `<div class="article-tags">🏷️ ${tagsHtml}</div>` : ''}
      </div>
      ${coverImagePath ? `<div class="article-cover"><img src="${coverImagePath}" alt="${title}"></div>` : ''}
    </header>
    <div class="article-content">
${content}
    </div>
  </article>
</body>
</html>`;

      const base64 = btoa(unescape(encodeURIComponent(html)));

      showStatus('正在保存文章...', 'info');

      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${ARTICLES_PATH}/${filename}`, {
          method: 'PUT',
          headers: {
            'Authorization': 'token ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: `Add article: ${title} [${category}]`,
            content: base64,
            branch: BRANCH
          })
        });

        if (res.ok) {
          showStatus('✅ 文章发布成功！约 2 分钟后网站自动更新', 'success');
          // 清空
          document.getElementById('articleTitle').value = '';
          document.getElementById('articleSubtitle').value = '';
          document.getElementById('articleAuthor').value = '';
          document.getElementById('articleTags').value = '';
          document.getElementById('seoTitle').value = '';
          document.getElementById('seoKeywords').value = '';
          document.getElementById('seoDesc').value = '';
          document.getElementById('coverPreview').innerHTML = '暂无封面';
          document.getElementById('attrTop').checked = false;
          document.getElementById('attrRec').checked = false;
          document.getElementById('attrPush').checked = false;
          document.getElementById('attrBold').checked = false;
          document.getElementById('attrImg').checked = false;
          coverImagePath = '';
          quill.setContents([]);
        } else {
          const err = await res.json();
          if (res.status === 401) {
            showStatus('Token 无效或已过期，请重新登录', 'error');
            localStorage.removeItem('hskb_editor_token');
            setTimeout(() => location.reload(), 2000);
          } else {
            showStatus('保存失败: ' + (err.message || '未知错误'), 'error');
          }
        }
      } catch(e) {
        showStatus('网络错误: ' + e.message, 'error');
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status show ' + type;
      if (type === 'success') {
        setTimeout(() => el.classList.remove('show'), 6000);
      }
    }

    init();
  </script>
</body>
</html>
