<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Content Manager</title>
  </head>
  <body>
    <div id="nc-root"></div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // 确保只有一个配置
      if (window.CMS_CONFIG) {
        delete window.CMS_CONFIG;
      }
      
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'YunWU914/HSKB',
            branch: 'main',
            base_url: 'https://www.smartmanu.net',
            auth_endpoint: '/auth',
          },
          media_folder: 'mechanical-workshop/images',
          public_folder: '/images',
          collections: [
            {
              name: 'site_pages',  // ← 改成唯一名称，不要叫 'pages'
              label: 'Pages',
              folder: 'mechanical-workshop',
              create: false,
              fields: [
                { label: 'Title', name: 'title', widget: 'string' },
                { label: 'Body', name: 'body', widget: 'markdown' },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
