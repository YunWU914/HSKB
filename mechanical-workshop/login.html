<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - smartmanu.net</title>
    <meta name="description" content="Login to your smartmanu.net account">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preload" href="css/styles.css" as="style">
    <link rel="stylesheet" href="css/styles.css" media="screen">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">smartmanu.net</a>
        </div>
    </header>
    
    <main class="container">
        <div class="auth-form">
            <h1>Login</h1>
            <form id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" onclick="handleLogin()">Login</button>
                <p class="form-link">
                    <a href="register.html">Don't have an account? Register here</a>
                </p>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 smartmanu.net. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js" defer></script>
</body>
</html>
